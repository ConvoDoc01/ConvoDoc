<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A59"></stop>
      <stop offset="100%" stop-color="#E65C3C"></stop>
    </linearGradient>
  </defs>

  <!-- Top Left Rounded Square -->
  <rect x="30" y="30" width="120" height="120" rx="28" fill="url(#orangeGrad)"></rect>

  <!-- Bottom Right Rounded Square -->
  <rect x="90" y="90" width="120" height="120" rx="28" fill="url(#orangeGrad)"></rect>

  <!-- Center Small Square -->
  <rect x="113" y="113" width="14" height="14" fill="white"></rect>

  <!-- Top Arrow (Down-Right, smaller & not touching center) -->
  <path d="M75 75 L105 105" stroke="white" stroke-width="10" stroke-linecap="round"></path>
  <path d="M105 105 L105 85" stroke="white" stroke-width="10" stroke-linecap="round"></path>
  <path d="M105 105 L85 105" stroke="white" stroke-width="10" stroke-linecap="round"></path>

  <!-- Bottom Arrow (Up-Left, smaller & not touching center) -->
  <path d="M165 165 L135 135" stroke="white" stroke-width="10" stroke-linecap="round"></path>
  <path d="M135 135 L135 155" stroke="white" stroke-width="10" stroke-linecap="round"></path>
  <path d="M135 135 L155 135" stroke="white" stroke-width="10" stroke-linecap="round"></path>

</svg>
