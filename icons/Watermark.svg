<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7A00"></stop>
      <stop offset="100%" stop-color="#FF4D00"></stop>
    </linearGradient>
  </defs>

  <!-- Bigger Orange File Shape -->
  <rect x="4.5" y="2" width="15" height="20" rx="2.5" fill="url(#orangeGrad)"></rect>

  <!-- Fold Corner -->
  <polygon points="14.5,2 19.5,7 14.5,7" fill="white"></polygon>

  <!-- PDF Border Box -->
  <rect x="5.8" y="5.8" width="6" height="3.5" rx="0.8" fill="none" stroke="white" stroke-width="0.5"></rect>

  <text x="8.8" y="8.1" text-anchor="middle" font-size="2.3" font-family="Arial" fill="white">
    PDF
  </text>

  <!-- Watermark Circle -->
  <circle cx="12" cy="14.5" r="3.2" fill="none" stroke="white" stroke-width="0.6" stroke-dasharray="1.6 2"></circle>

  <!-- A Letter -->
  <text x="12" y="15.7" text-anchor="middle" font-size="3.5" font-family="Arial" fill="white">
    A
  </text>

</svg>
